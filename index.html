<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Lead — Incubadora</title>
<style>
  :root {
    --bg: #0F1115;
    --card: #1A1D24;
    --border: #2A2E38;
    --text: #ECEDEF;
    --text-dim: #8A8F9C;
    --accent: #FF7A30;
    --accent-dim: #4A3424;
    --success: #3DDC97;
    --danger: #FF5C5C;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 24px;
  }

  header .label {
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 700;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  label .opt {
    color: var(--text-dim);
    font-weight: 400;
  }

  input[type="text"],
  input[type="tel"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    background: #11141A;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
  }

  .estado-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .estado-opt {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-dim);
    background: #11141A;
    transition: all 0.15s;
  }

  .estado-opt.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #1A0E05;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }

  .submit-btn:active { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }

  .msg.show { display: block; }
  .msg.success { background: rgba(61, 220, 151, 0.12); border: 1px solid var(--success); color: var(--success); }
  .msg.error { background: rgba(255, 92, 92, 0.12); border: 1px solid var(--danger); color: var(--danger); }

  .list-toggle {
    text-align: center;
    margin-top: 20px;
  }

  .list-toggle button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
  }

  .lead-item {
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    font-size: 13px;
  }

  .lead-item:last-child { border-bottom: none; }

  .lead-item .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .lead-item .nombre { font-weight: 600; }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge.nuevo { background: rgba(255,122,48,0.15); color: var(--accent); }
  .badge.en_seguimiento { background: rgba(255,200,0,0.15); color: #FFC800; }
  .badge.caliente { background: rgba(255,92,92,0.15); color: var(--danger); }
  .badge.cerrado { background: rgba(61,220,151,0.15); color: var(--success); }
  .badge.frio { background: rgba(138,143,156,0.15); color: var(--text-dim); }

  .lead-item .meta { color: var(--text-dim); font-size: 12px; }

  #listSection { display: none; }
  #listSection.show { display: block; }

  .loading-text { color: var(--text-dim); font-size: 13px; text-align: center; padding: 12px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="label">Incubadora de Negocios</div>
    <h1>Registrar Lead</h1>
  </header>

  <div id="msgBox" class="msg"></div>

  <form id="leadForm" class="card">
    <div class="field">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" required placeholder="Ej. María Pérez">
    </div>

    <div class="field">
      <label for="telefono">Teléfono (con código de país)</label>
      <input type="tel" id="telefono" required placeholder="Ej. 524771234567">
    </div>

    <div class="field">
      <label for="servicio">Servicio de interés <span class="opt">(opcional)</span></label>
      <select id="servicio">
        <option value="">— Selecciona —</option>
        <option value="CRM">CRM omnicanal con IA</option>
        <option value="Automatizacion WhatsApp">Automatización WhatsApp con IA</option>
        <option value="App personalizada">Desarrollo de app personalizada</option>
        <option value="Curso IA">Curso empresarial de IA</option>
        <option value="Marketing Digital">Marketing digital</option>
        <option value="Capacitacion">Capacitación empresarial</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="field">
      <label>Estado</label>
      <div class="estado-grid" id="estadoGrid">
        <div class="estado-opt active" data-val="nuevo">Nuevo</div>
        <div class="estado-opt" data-val="en_seguimiento">En seguimiento</div>
        <div class="estado-opt" data-val="caliente">Caliente</div>
        <div class="estado-opt" data-val="frio">Frío</div>
      </div>
    </div>

    <div class="field">
      <label for="proximoSeguimiento">Próximo seguimiento <span class="opt">(opcional)</span></label>
      <input type="date" id="proximoSeguimiento">
    </div>

    <div class="field">
      <label for="origen">Origen <span class="opt">(opcional)</span></label>
      <select id="origen">
        <option value="manual">Manual</option>
        <option value="Meta Ads">Meta Ads</option>
        <option value="Referido">Referido</option>
        <option value="Organico">Orgánico / redes</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="field">
      <label for="notas">Notas <span class="opt">(opcional)</span></label>
      <textarea id="notas" placeholder="Contexto rápido: qué pidió, objeciones, cuándo decide..."></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Guardar lead</button>
  </form>

  <div class="list-toggle">
    <button id="toggleListBtn" type="button">Ver leads registrados</button>
  </div>

  <div id="listSection" class="card">
    <div id="listContent" class="loading-text">Cargando...</div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://ytxnmscxyjttqftmznqj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_T3LJo-8teMIkimAtHitGWA_XKjzDBP5";

  const form = document.getElementById('leadForm');
  const msgBox = document.getElementById('msgBox');
  const submitBtn = document.getElementById('submitBtn');
  const estadoGrid = document.getElementById('estadoGrid');
  let estadoSeleccionado = 'nuevo';

  estadoGrid.addEventListener('click', (e) => {
    const opt = e.target.closest('.estado-opt');
    if (!opt) return;
    document.querySelectorAll('.estado-opt').forEach(el => el.classList.remove('active'));
    opt.classList.add('active');
    estadoSeleccionado = opt.dataset.val;
  });

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'msg show ' + type;
    setTimeout(() => { msgBox.className = 'msg'; }, 4000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Guardando...';

    const payload = {
      nombre: document.getElementById('nombre').value.trim(),
      telefono: document.getElementById('telefono').value.trim(),
      servicio_interes: document.getElementById('servicio').value || null,
      estado: estadoSeleccionado,
      fecha_proximo_seguimiento: document.getElementById('proximoSeguimiento').value || null,
      origen: document.getElementById('origen').value,
      notas: document.getElementById('notas').value.trim() || null
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_whatsapp`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText || 'Error al guardar');
      }

      showMsg('Lead guardado correctamente.', 'success');
      form.reset();
      document.querySelectorAll('.estado-opt').forEach(el => el.classList.remove('active'));
      estadoGrid.querySelector('[data-val="nuevo"]').classList.add('active');
      estadoSeleccionado = 'nuevo';

      if (document.getElementById('listSection').classList.contains('show')) {
        cargarLeads();
      }
    } catch (err) {
      console.error(err);
      showMsg('Error al guardar. Intenta de nuevo.', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Guardar lead';
    }
  });

  const toggleListBtn = document.getElementById('toggleListBtn');
  const listSection = document.getElementById('listSection');
  let listLoaded = false;

  toggleListBtn.addEventListener('click', () => {
    const isShowing = listSection.classList.contains('show');
    if (isShowing) {
      listSection.classList.remove('show');
      toggleListBtn.textContent = 'Ver leads registrados';
    } else {
      listSection.classList.add('show');
      toggleListBtn.textContent = 'Ocultar leads';
      cargarLeads();
    }
  });

  async function cargarLeads() {
    const listContent = document.getElementById('listContent');
    listContent.innerHTML = '<div class="loading-text">Cargando...</div>';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_whatsapp?select=*&order=fecha_registro.desc&limit=30`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!res.ok) throw new Error('Error al cargar');
      const leads = await res.json();

      if (leads.length === 0) {
        listContent.innerHTML = '<div class="loading-text">No hay leads registrados aún.</div>';
        return;
      }

      const estadoLabels = {
        nuevo: 'Nuevo',
        en_seguimiento: 'En seguimiento',
        caliente: 'Caliente',
        cerrado: 'Cerrado',
        frio: 'Frío'
      };

      listContent.innerHTML = leads.map(lead => `
        <div class="lead-item">
          <div class="top">
            <span class="nombre">${escapeHtml(lead.nombre)}</span>
            <span class="badge ${lead.estado}">${estadoLabels[lead.estado] || lead.estado}</span>
          </div>
          <div class="meta">
            ${escapeHtml(lead.telefono)}
            ${lead.servicio_interes ? ' · ' + escapeHtml(lead.servicio_interes) : ''}
            ${lead.fecha_proximo_seguimiento ? ' · Próx: ' + lead.fecha_proximo_seguimiento : ''}
          </div>
        </div>
      `).join('');
    } catch (err) {
      console.error(err);
      listContent.innerHTML = '<div class="loading-text">Error al cargar leads.</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
